<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
  <meta name="apple-mobile-web-app-title" content="명상">
  <title>명상</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    }

    #app {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background-color: #0e0e10;
      position: relative;
      overflow: hidden;
    }

    .card {
      width: min(88vw, 360px);
      background: rgba(255,255,255,0.07);
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 36px 28px;
      display: flex; flex-direction: column; align-items: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      max-height: 90vh;
      overflow-y: auto;
    }

    .step { display: none; width: 100%; flex-direction: column; align-items: center; }
    .step.active { display: flex; }

    .title {
      font-size: 22px; font-weight: 400;
      color: rgba(255,255,255,0.92);
      text-align: center;
      line-height: 1.6;
      margin-bottom: 24px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      text-align: center;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    /* =============================================
       사진 업로드 영역
    ============================================= */
    .photo-upload { width: 100%; margin-bottom: 20px; }

    .photo-box {
      width: 100%; height: 160px;
      border-radius: 16px;
      border: 1.5px dashed rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px;
      cursor: pointer; overflow: hidden; position: relative;
      margin-bottom: 10px; transition: border-color 0.2s;
    }
    .photo-box:active { border-color: rgba(255,255,255,0.5); }

    .photo-box img {
      width: 100%; height: 100%; object-fit: cover;
      position: absolute; inset: 0; border-radius: 14px;
    }

    .photo-icon { font-size: 32px; color: rgba(255,255,255,0.2); }
    .photo-text { font-size: 13px; color: rgba(255,255,255,0.3); }

    .photo-overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,0.5);
      align-items: center; justify-content: center;
      font-size: 13px; color: white; border-radius: 14px;
    }
    .photo-box:active .photo-overlay { display: flex; }

    .file-input { display: none; }

    .photo-label {
      font-size: 12px; color: rgba(255,255,255,0.35);
      text-align: center; margin-bottom: 8px;
    }

    /* =============================================
       버튼
    ============================================= */
    .btn {
      width: 100%; padding: 15px; border-radius: 50px;
      border: 0.5px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.9); font-size: 16px;
      font-family: inherit; cursor: pointer;
      transition: background 0.2s; margin-top: 6px;
    }
    .btn:active { background: rgba(255,255,255,0.2); }
    .btn.primary { background: rgba(255,255,255,0.18); font-weight: 500; }
    .btn.ghost { background: transparent; border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); font-size: 14px; }

    /* =============================================
       확인 단계 썸네일 3개
    ============================================= */
    .confirm-row {
      display: flex; justify-content: space-around;
      width: 100%; margin-bottom: 28px; gap: 8px;
    }
    .confirm-item { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
    .confirm-thumb {
      width: 100%; aspect-ratio: 1; border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.15); overflow: hidden;
      background: rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: center;
    }
    .confirm-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .confirm-label { font-size: 11px; color: rgba(255,255,255,0.4); text-align: center; }

    /* =============================================
       명상 세션 화면 (풀스크린)
    ============================================= */
    #session {
      display: none; position: absolute; inset: 0;
      align-items: flex-end; justify-content: center;
      padding-bottom: 48px; cursor: pointer;
    }
    #session.active { display: flex; }

    /* 배경 이미지 레이어 */
    #session-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      transition: opacity 1.5s ease; opacity: 0;
    }

    /* 배경 색상 레이어 (사진 없을 때) */
    #session-color {
      position: absolute; inset: 0;
      transition: background-color 1.5s ease;
    }

    #session-hint {
      position: relative; z-index: 10;
      font-size: 12px; color: rgba(255,255,255,0.2); letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
<div id="app">

  <div class="card" id="card">

    <!-- STEP 1: 환영 -->
    <div class="step active" id="step-1">
      <div class="title">오신 걸<br>언제나 환영합니다</div>
      <div class="subtitle">사진을 설정하고<br>호흡에 집중해보세요</div>
      <button class="btn primary" onclick="goStep(2)">시작하기</button>
    </div>

    <!-- STEP 2: 들이쉬기 사진 -->
    <div class="step" id="step-2">
      <div class="title">숨을 들이쉴 때<br>보여줄 사진을 골라주세요</div>
      <div class="photo-upload">
        <div class="photo-label">들이쉬기 사진</div>
        <div class="photo-box" onclick="triggerUpload('inhale')">
          <img id="inhale-img" src="" style="display:none;">
          <div class="photo-icon" id="inhale-icon">🖼</div>
          <div class="photo-text" id="inhale-text">탭해서 사진 선택</div>
          <div class="photo-overlay">사진 바꾸기</div>
        </div>
        <input class="file-input" type="file" id="inhale-file" accept="image/*" onchange="handlePhoto('inhale', this)">
      </div>
      <button class="btn primary" onclick="goStep(3)">다음</button>
      <button class="btn ghost" onclick="goStep(3)" style="margin-top:8px;">사진 없이 색상으로</button>
    </div>

    <!-- STEP 3: 내쉬기 사진 -->
    <div class="step" id="step-3">
      <div class="title">숨을 내쉴 때<br>보여줄 사진을 골라주세요</div>
      <div class="photo-upload">
        <div class="photo-label">내쉬기 사진</div>
        <div class="photo-box" onclick="triggerUpload('exhale')">
          <img id="exhale-img" src="" style="display:none;">
          <div class="photo-icon" id="exhale-icon">🖼</div>
          <div class="photo-text" id="exhale-text">탭해서 사진 선택</div>
          <div class="photo-overlay">사진 바꾸기</div>
        </div>
        <input class="file-input" type="file" id="exhale-file" accept="image/*" onchange="handlePhoto('exhale', this)">
      </div>
      <button class="btn primary" onclick="goStep(4)">다음</button>
      <button class="btn ghost" onclick="goStep(4)" style="margin-top:8px;">사진 없이 색상으로</button>
    </div>

    <!-- STEP 4: 멈추기 사진 -->
    <div class="step" id="step-4">
      <div class="title">잠시 멈출 때<br>보여줄 사진을 골라주세요</div>
      <div class="photo-upload">
        <div class="photo-label">멈추기 사진</div>
        <div class="photo-box" onclick="triggerUpload('hold')">
          <img id="hold-img" src="" style="display:none;">
          <div class="photo-icon" id="hold-icon">🖼</div>
          <div class="photo-text" id="hold-text">탭해서 사진 선택</div>
          <div class="photo-overlay">사진 바꾸기</div>
        </div>
        <input class="file-input" type="file" id="hold-file" accept="image/*" onchange="handlePhoto('hold', this)">
      </div>
      <button class="btn primary" onclick="goStep(5)">다음</button>
      <button class="btn ghost" onclick="goStep(5)" style="margin-top:8px;">사진 없이 색상으로</button>
    </div>

    <!-- STEP 5: 확인 & 시작 -->
    <div class="step" id="step-5">
      <div class="title">준비가 되셨나요?</div>
      <div class="confirm-row">
        <div class="confirm-item">
          <div class="confirm-thumb" id="c-inhale"><span style="font-size:20px;color:rgba(255,255,255,0.2)">🖼</span></div>
          <span class="confirm-label">들이쉬기</span>
        </div>
        <div class="confirm-item">
          <div class="confirm-thumb" id="c-hold"><span style="font-size:20px;color:rgba(255,255,255,0.2)">🖼</span></div>
          <span class="confirm-label">멈추기</span>
        </div>
        <div class="confirm-item">
          <div class="confirm-thumb" id="c-exhale"><span style="font-size:20px;color:rgba(255,255,255,0.2)">🖼</span></div>
          <span class="confirm-label">내쉬기</span>
        </div>
      </div>
      <button class="btn primary" onclick="startSession()">명상 시작</button>
      <button class="btn ghost" onclick="goStep(2)" style="margin-top:10px;">다시 설정하기</button>
    </div>

  </div>

  <!-- 명상 세션 화면 — 텍스트 없음, 사진/색상 풀스크린 -->
  <div id="session" onclick="stopSession()">
    <div id="session-color"></div>
    <div id="session-bg"></div>
    <span id="session-hint">탭하면 종료</span>
  </div>

</div>
<script>
  // =============================================
  // [수정 포인트 1] 호흡 타이밍 (밀리초, 1000 = 1초)
  // 4-7-8 호흡법: 들이쉬기 4초 / 멈추기 7초 / 내쉬기 8초
  // =============================================
  const TIMING = {
    inhale: 4000,  // 들이쉬기 4초
    hold:   7000,  // 멈추기 7초
    exhale: 8000,  // 내쉬기 8초
  };

  // =============================================
  // [수정 포인트 1-1] 세션 총 시간 (밀리초)
  // 5분 = 300000
  // =============================================
  const SESSION_DURATION = 300000; // 5분

  // 세션 종료 타이머
  let sessionEndTimer = null;

  // =============================================
  // [수정 포인트 2] 사진 없을 때 대체 색상
  // =============================================
  const FALLBACK = {
    inhale: '#4A90D9',
    hold:   '#7B68EE',
    exhale: '#1a1a2e',
  };

  // 사진 데이터 (base64)
  let photos = { inhale: null, hold: null, exhale: null };

  // 타이머
  let timer = null;

  // =============================================
  // 파일 선택창 열기
  // =============================================
  function triggerUpload(phase) {
    document.getElementById(phase + '-file').click();
  }

  // =============================================
  // 사진 선택 처리 — base64로 변환해서 저장
  // =============================================
  function handlePhoto(phase, input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      photos[phase] = e.target.result;
      // 미리보기 업데이트
      const img = document.getElementById(phase + '-img');
      img.src = e.target.result;
      img.style.display = 'block';
      document.getElementById(phase + '-icon').style.display = 'none';
      document.getElementById(phase + '-text').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  // =============================================
  // 단계 이동
  // =============================================
  function goStep(n) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById('step-' + n).classList.add('active');
    if (n === 5) updateConfirm();
  }

  // 확인 단계 썸네일 업데이트
  function updateConfirm() {
    ['inhale', 'hold', 'exhale'].forEach(phase => {
      const thumb = document.getElementById('c-' + phase);
      if (photos[phase]) {
        thumb.innerHTML = `<img src="${photos[phase]}">`;
      } else {
        thumb.innerHTML = '';
        thumb.style.backgroundColor = FALLBACK[phase];
      }
    });
  }

  // =============================================
  // 세션 화면에 사진 또는 색상 표시
  // =============================================
  function showPhase(phase) {
    const bg = document.getElementById('session-bg');
    const col = document.getElementById('session-color');
    if (photos[phase]) {
      bg.style.backgroundImage = `url(${photos[phase]})`;
      bg.style.opacity = '1';
      col.style.backgroundColor = 'transparent';
    } else {
      bg.style.opacity = '0';
      col.style.backgroundColor = FALLBACK[phase];
    }
  }

  // =============================================
  // 호흡 사이클 — 들이쉬기 → 멈추기 → 내쉬기 → 반복
  // =============================================
  function runCycle() {
    showPhase('inhale');
    playTone('inhale');
    timer = setTimeout(() => {
      showPhase('hold');
      playTone('hold');
      timer = setTimeout(() => {
        showPhase('exhale');
        playTone('exhale');
        timer = setTimeout(runCycle, TIMING.exhale);
      }, TIMING.hold);
    }, TIMING.inhale);
  }

  // =============================================
  // 세션 시작 / 종료
  // =============================================
  function startSession() {
    document.getElementById('card').style.display = 'none';
    document.getElementById('session').classList.add('active');
    runCycle();
    // 5분 후 자동 종료
    sessionEndTimer = setTimeout(stopSession, SESSION_DURATION);
  }

  function stopSession() {
    clearTimeout(timer);
    clearTimeout(sessionEndTimer);
    document.getElementById('session').classList.remove('active');
    document.getElementById('card').style.display = 'flex';
    document.getElementById('session-bg').style.backgroundImage = '';
    document.getElementById('session-color').style.backgroundColor = '';
    goStep(5);
  }

  // =============================================
  // [수정 포인트 3] 소리 — 사인파 톤
  // 끄려면 함수 내용을 비워두세요
  // =============================================
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playTone(phase) {
    const freqs = { inhale: 432, hold: 320, exhale: 256 };
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freqs[phase], audioCtx.currentTime);
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.1);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.8);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.9);
  }
</script>
</body>
</html>
